<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레시피 원가 계산기</title>
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0ede8;
    --text:#1a1a18;--text2:#6b6b68;--text3:#9a9a96;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --accent:#1a1a18;--accent-text:#ffffff;
    --info-bg:#e8f0fb;--info-text:#1a4fa0;
    --success-bg:#e8f5ec;--success-text:#1a6e35;
    --radius:10px;--radius-lg:14px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
      --text:#f0ede8;--text2:#a0a09c;--text3:#6a6a66;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
      --accent:#f0ede8;--accent-text:#1c1c1a;
      --info-bg:#0f2a50;--info-text:#7aabf0;
      --success-bg:#0a2e18;--success-text:#4acf7a;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
  .app-header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .app-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
  .app-sub{font-size:12px;color:var(--text2);margin-top:1px}
  .header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .save-btn,.download-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
  .save-btn{background:var(--accent);color:var(--accent-text);border:none}
  .download-btn{background:transparent;color:var(--text);border:0.5px solid var(--border2)}
  .save-btn:hover,.download-btn:hover{opacity:.85}
  .container{max-width:1280px;margin:0 auto;padding:20px 16px 60px}
  .tab-bar{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;margin-bottom:20px;gap:2px}
  .tab{flex:1;padding:9px 12px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-radius:8px;transition:all .15s;user-select:none}
  .tab.active{background:var(--accent);color:var(--accent-text)}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card.collapsed{padding:14px 18px}
  .card.collapsed .card-header{margin-bottom:0}
  .product-summary{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
  .product-title{font-size:15px;font-weight:600;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .product-meta{font-size:12px;color:var(--text2);white-space:nowrap}
  .product-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .product-name-input{font-size:15px;font-weight:600;border:none;outline:none;background:transparent;color:var(--text);width:60%;letter-spacing:-.02em;font-family:inherit}
  .product-name-input::placeholder{color:var(--text3);font-weight:400}
  .slabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:14px}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;font-weight:600;color:var(--text3);text-align:left;padding:5px 8px;border-bottom:0.5px solid var(--border);letter-spacing:.03em}
  td{padding:4px 6px;border-bottom:0.5px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  td input[type="text"],td input[type="number"]{width:100%;background:transparent;border:none;font-size:13px;color:var(--text);outline:none;padding:3px 4px;border-radius:4px;font-family:inherit}
  td input:focus{background:var(--bg2)}
  td input[type="number"]{text-align:right}
  td input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
  .add-row{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:6px 4px;border-radius:6px;margin-top:4px}
  .add-row:hover{color:var(--text)}
  .btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:inherit}
  .btn:hover{background:var(--bg2)}
  .btn-primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .btn-primary:hover{opacity:.85}
  .btn-danger{color:#c0392b;border-color:rgba(192,57,43,.3);font-size:12px;padding:4px 10px}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .count-badge{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:20px;padding:3px 10px;border:0.5px solid var(--border)}
  .empty{color:var(--text3);font-size:13px;padding:24px;text-align:center}
  .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);font-size:13px;margin:4px;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:all .12s;user-select:none}
  .chip.selected{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-text);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap}
  .toast.show{opacity:1}

  /* 엑셀 붙여넣기 힌트 */
  .paste-hint{font-size:11px;color:var(--text3);padding:4px 4px 0;display:flex;align-items:center;gap:4px}
  .paste-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:10px 12px;margin-top:6px;font-size:12px;color:var(--text3);text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
  .paste-zone:hover,.paste-zone.active{border-color:var(--accent);background:var(--bg2);color:var(--text2)}

  /* 결과 카드 */
  .rcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
  .result-grid{display:grid;grid-template-columns:1fr;gap:14px;align-items:start}
  .result-grid .rcard{margin-bottom:0}
  .rcard-head{padding:14px 18px 12px;border-bottom:0.5px solid var(--border)}
  .rcard-name{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px}
  .unit-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .unit-ctrl-label{font-size:12px;color:var(--text2);flex-shrink:0}
  .unit-select{background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:6px 10px;cursor:pointer;outline:none;flex-shrink:0;max-width:210px}
  .unit-select:focus{border-color:var(--accent)}
  .unit-input-wrap{display:flex;align-items:center;gap:4px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:4px 10px}
  .unit-input-wrap:focus-within{border-color:var(--accent)}
  .unit-weight-input{width:80px;background:transparent;border:none;font-size:15px;font-weight:600;color:var(--text);font-family:inherit;outline:none;text-align:right;padding:2px 0}
  .unit-weight-unit{font-size:12px;color:var(--text2);flex-shrink:0}
  .ratio-badge{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--info-bg);color:var(--info-text);font-weight:600;flex-shrink:0;min-width:52px;text-align:center}
  .rcard-body{padding:4px 18px 12px}
  .rt{width:100%;border-collapse:collapse;margin-top:8px}
  .rt th{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;padding:5px 8px 8px;border-bottom:0.5px solid var(--border);text-align:left}
  .rt th.num{text-align:right}
  .rt td{padding:7px 8px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:middle}
  .rt tr:last-child td{border-bottom:none}
  .rt td.num{text-align:right}
  .rt td.wt{text-align:right;font-weight:500}
  .rt td.cost{text-align:right;font-weight:600}
  .rt td.cost-na{text-align:right;color:var(--text3)}
  .rt tr.subtotal td{background:var(--bg2);font-weight:600;border-top:0.5px solid var(--border2)}
  .tkind{display:inline-block;font-size:10px;padding:1px 6px;border-radius:5px;margin-left:5px;font-weight:500;vertical-align:middle}
  .k-ing{background:var(--bg2);color:var(--text2)}
  .k-sup{background:var(--success-bg);color:var(--success-text)}
  .k-unit{background:var(--info-bg);color:var(--info-text)}
  .rcard-foot{padding:10px 18px 12px;background:var(--bg2);border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;align-items:center;gap:28px}
  .foot-desc{flex:1;font-size:12px;color:var(--text2)}
  .foot-item{text-align:right}
  .foot-label{font-size:11px;color:var(--text3);margin-bottom:2px}
  .foot-val{font-size:18px;font-weight:700;letter-spacing:-.03em}
  .grand{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;margin-top:20px}
  .grand-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
  .grand-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;text-align:center}
  .metric-label{font-size:12px;color:var(--text2);margin-bottom:5px}
  .metric-value{font-size:24px;font-weight:600;letter-spacing:-.03em}

  @media(max-width:540px){
    .container{padding:14px 10px 60px}
    .metric-value{font-size:20px}
    .unit-ctrl{gap:6px}
  }
  @media(min-width:760px){
    .result-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  @media(min-width:1120px){
    .result-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .result-grid .rcard-head{padding:12px 14px 10px}
    .result-grid .rcard-body{padding:4px 12px 10px}
    .result-grid .rcard-foot{padding:10px 14px;gap:12px;flex-wrap:wrap}
    .result-grid .unit-select{max-width:100%;width:100%}
    .result-grid .unit-input-wrap{flex:1;min-width:118px}
    .result-grid .rt td,.result-grid .rt th{padding-left:5px;padding-right:5px}
    .result-grid .foot-desc{flex-basis:100%}
    .result-grid .foot-val{font-size:16px}
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title">레시피 원가 계산기</div>
    <div class="app-sub">데이터는 브라우저에 자동 저장됩니다</div>
  </div>
  <div class="header-btns">
    <button class="download-btn" onclick="downloadData()">⬇ 다운로드</button>
    <button class="save-btn" onclick="saveData()">💾 저장</button>
  </div>
</header>

<div class="container">
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="recipe">① 레시피 입력</div>
    <div class="tab" data-tab="price">② 단가 입력</div>
    <div class="tab" data-tab="result">③ 결과 보기</div>
  </div>

  <div id="tab-recipe">
    <div class="top-bar">
      <span class="count-badge">제품 <span id="productCount">0</span>개</span>
      <button class="btn btn-primary" id="addProductBtn">＋ 제품 추가</button>
    </div>
    <div id="productList"></div>
  </div>

  <div id="tab-price" style="display:none">
    <div class="card">
      <div class="slabel" style="margin-top:0">원료 단가</div>
      <table>
        <thead><tr><th>원료명</th><th style="text-align:right">단위 (g)</th><th style="text-align:right">단가 (원)</th></tr></thead>
        <tbody id="ingredientPriceTable"></tbody>
      </table>
      <div id="ingredientPriceEmpty" class="empty" style="padding:16px">레시피 탭에서 원료를 먼저 입력해주세요.</div>
    </div>
    <div class="card">
      <div class="slabel" style="margin-top:0">영양제 단가</div>
      <table>
        <thead><tr><th>영양제명</th><th style="text-align:right">단위 (g)</th><th style="text-align:right">단가 (원)</th></tr></thead>
        <tbody id="supplementPriceTable"></tbody>
      </table>
      <div id="supplementPriceEmpty" class="empty" style="padding:16px">레시피 탭에서 영양제를 먼저 입력해주세요.</div>
    </div>
  </div>

  <div id="tab-result" style="display:none">
    <div class="card">
      <div class="slabel" style="margin-top:0">제품 선택 <span style="font-size:11px;color:var(--text3);text-transform:none;font-weight:400;letter-spacing:0">(복수 선택 가능)</span></div>
      <div id="productChips"></div>
    </div>
    <div id="resultArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { products: [], prices: {}, selectedProducts: [], resultOptions: {} };
let editingProductId = null;

function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function priceKey(s) { return String(s || '').trim(); }
function fmt(n) { const v = Math.round(n * 100) / 100; return v % 1 === 0 ? v.toLocaleString() : v.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:2}); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

/* ── 저장/불러오기 ── */
function saveData() { collectAllInputs(); localStorage.setItem('rcd6', JSON.stringify(state)); showToast('저장 완료!'); }
function downloadData() {
  collectAllInputs();
  localStorage.setItem('rcd6', JSON.stringify(state));
  const today = new Date().toISOString().slice(0, 10);
  const payload = {
    app: 'recipe-cost-calculator',
    exportedAt: new Date().toISOString(),
    products: state.products,
    prices: state.prices,
    selectedProducts: state.selectedProducts,
    resultOptions: state.resultOptions
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `recipe-cost-${today}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('다운로드 완료!');
}
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem('rcd6') || '{}');
    state.products = d.products || [];
    state.prices = d.prices || {};
    state.selectedProducts = d.selectedProducts || [];
    state.resultOptions = d.resultOptions || {};
  } catch(e) {}
}

/* ── 입력값 수집 ── */
function collectAllInputs() {
  state.products.forEach(p => {
    const el = document.getElementById('pname-' + p.id);
    if (el) p.name = el.value;
    p.ingredients.forEach(r => {
      const nm = document.getElementById('ing-name-' + r.id);
      const wt = document.getElementById('ing-wt-' + r.id);
      const ck = document.getElementById('ing-ck-' + r.id);
      const un = document.getElementById('ing-un-' + r.id);
      const uname = document.getElementById('ing-uname-' + r.id);
      if (nm) r.name = nm.value;
      if (un) r.unit = un.value;
      if (wt) {
        const raw = parseFloat(wt.value) || 0;
        r.weight = (r.unit === 'kg') ? raw * 1000 : raw;
        r.displayWeight = raw;
      }
      if (ck) r.isUnit = ck.checked;
      if (uname) r.unitName = uname.value.trim();
      else if (!r.isUnit) r.unitName = '';
    });
    p.supplements.forEach(r => {
      const nm = document.getElementById('sup-name-' + r.id);
      const wt = document.getElementById('sup-wt-' + r.id);
      const un = document.getElementById('sup-un-' + r.id);
      if (nm) r.name = nm.value;
      if (un) r.unit = un.value;
      if (wt) {
        const raw = parseFloat(wt.value) || 0;
        r.weight = (r.unit === 'kg') ? raw * 1000 : raw;
        r.displayWeight = raw;
      }
    });
  });
  collectPrices();
  collectResultInputs();
}

function getResultOption(pid) {
  if (!state.resultOptions) state.resultOptions = {};
  if (!state.resultOptions[pid]) state.resultOptions[pid] = { unitId: '', weight: '', supplementOnly: false };
  return state.resultOptions[pid];
}

function collectResultInputs() {
  if (!state.resultOptions) state.resultOptions = {};
  state.selectedProducts.forEach(pid => {
    const opt = getResultOption(pid);
    const sel = document.getElementById('usel-' + pid);
    const wt = document.getElementById('uwt-' + pid);
    const supOnly = document.getElementById('suponly-' + pid);
    if (sel) opt.unitId = sel.value;
    if (wt) opt.weight = wt.value;
    if (supOnly) opt.supplementOnly = supOnly.checked;
  });
}
function collectPrices() {
  document.querySelectorAll('#ingredientPriceTable tr[data-name], #supplementPriceTable tr[data-name]').forEach(tr => {
    const nm = priceKey(tr.dataset.name);
    if (!nm) return;
    const unitValue = tr.querySelector('.unit-inp')?.value.trim() || '';
    const priceValue = tr.querySelector('.price-inp')?.value.trim() || '';
    const hasPrice = priceValue !== '';
    if (!state.prices[nm]) state.prices[nm] = {};
    state.prices[nm].unit  = parseFloat(unitValue) || (hasPrice ? 1000 : 0);
    state.prices[nm].price = hasPrice ? (parseFloat(priceValue) || 0) : 0;
    state.prices[nm].hasPrice = hasPrice;
  });
}

/* ── 엑셀 붙여넣기 파싱 ──
   형식: 원료명\t무게\t생산단위 (3컬럼)
   생산단위 컬럼: 1, y, o, ★, v, ✓ 등이면 체크
*/
function parseExcelPaste(text) {
  const rows = text.trim().split(/\r?\n/).map(row => row.split('\t'));
  const result = [];
  rows.forEach(cols => {
    const name    = (cols[0] || '').trim();
    const weight  = parseFloat((cols[1] || '').trim().replace(/,/g, ''));
    const unitRaw = (cols[2] || '').trim().toLowerCase();
    const isUnit  = ['1','y','yes','true','o','★','v','✓','체크'].includes(unitRaw);
    if (name && !isNaN(weight) && weight > 0) {
      result.push({ name, weight, isUnit });
    }
  });
  return result;
}

function applyPaste(pid, type, text) {
  const parsed = parseExcelPaste(text);
  if (!parsed.length) { showToast('붙여넣을 데이터 없음. 형식: 원료명↹무게↹생산단위(1 또는 빈칸)'); return; }
  collectAllInputs();
  const p = state.products.find(p => p.id === pid);
  if (!p) return;
  const arr = type === 'ing' ? p.ingredients : p.supplements;
  const filtered = arr.filter(r => r.name.trim() || r.weight > 0);
  parsed.forEach(item => {
    filtered.push({ id: uid(), name: item.name, weight: item.weight, unit: 'g', isUnit: type === 'ing' ? item.isUnit : false });
  });
  if (type === 'ing') p.ingredients = filtered;
  else p.supplements = filtered;
  renderProducts();
  syncPriceTab();
  showToast(`${parsed.length}개 행 붙여넣기 완료`);
}

/* ── 레시피 탭 ── */
function addProduct() {
  collectAllInputs();
  const newP = { id: uid(), name: '', ingredients: [], supplements: [] };
  state.products.push(newP);
  editingProductId = newP.id;
  renderProducts();
  syncPriceTab();
  // 새로 추가된 제품명 input에 포커스
  setTimeout(() => {
    const el = document.getElementById('pname-' + newP.id);
    if (el) el.focus();
  }, 50);
}

function removeProduct(id) {
  collectAllInputs();
  state.products = state.products.filter(p => p.id !== id);
  if (editingProductId === id) editingProductId = null;
  renderProducts();
  syncPriceTab();
}
function editProduct(id) {
  collectAllInputs();
  editingProductId = editingProductId === id ? null : id;
  renderProducts();
}
function addIngredient(pid, type) {
  collectAllInputs();
  const p = state.products.find(p => p.id === pid);
  if (!p) return;
  const newR = { id: uid(), name: '', weight: 0, unit: 'g', isUnit: false, unitName: '' };
  (type === 'ing' ? p.ingredients : p.supplements).push(newR);
  renderProducts();
  syncPriceTab();
  setTimeout(() => {
    const el = document.getElementById((type === 'ing' ? 'ing' : 'sup') + '-name-' + newR.id);
    if (el) el.focus();
  }, 50);
}
function removeRow(pid, type, rid) {
  collectAllInputs();
  const p = state.products.find(p => p.id === pid);
  if (!p) return;
  const arr = type === 'ing' ? p.ingredients : p.supplements;
  const idx = arr.findIndex(r => r.id === rid);
  if (idx > -1) arr.splice(idx, 1);
  renderProducts();
  syncPriceTab();
}

function renderProducts() {
  document.getElementById('productCount').textContent = state.products.length;
  const el = document.getElementById('productList');
  if (!state.products.length) {
    el.innerHTML = '<div class="empty">제품을 추가해주세요.</div>';
    return;
  }
  el.innerHTML = state.products.map(p => {
    const isEditing = editingProductId === p.id;
    const title = p.name.trim() || '이름 없는 제품';
    const meta = `원료 ${p.ingredients.length}개 · 영양제 ${p.supplements.length}개`;
    return `
    <div class="card ${isEditing ? '' : 'collapsed'}">
      <div class="card-header">
        ${isEditing
          ? `<input id="pname-${p.id}" class="product-name-input" value="${esc(p.name)}" placeholder="제품명 입력">`
          : `<div class="product-summary"><div class="product-title">${esc(title)}</div><div class="product-meta">${esc(meta)}</div></div>`}
        <div class="product-actions">
          <button class="btn" data-edit="${p.id}">${isEditing ? '닫기' : '수정'}</button>
          <button class="btn btn-danger" data-remove="${p.id}">삭제</button>
        </div>
      </div>

      ${isEditing ? `
      <div class="slabel" style="margin-top:0">원료</div>
      <table>
        <thead><tr>
          <th>원료명</th>
          <th style="text-align:right;width:138px">레시피 무게</th>
          <th style="text-align:center;width:64px">생산단위</th>
          <th style="width:100px;font-size:11px;color:var(--text3)">단위명 <span style="font-weight:400">(생산단위용)</span></th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="ing-tbody-${p.id}">
        ${p.ingredients.map(r => {
          const dispW = r.unit === 'kg' ? (r.weight / 1000) : r.weight;
          return `<tr>
          <td><input type="text" id="ing-name-${r.id}" value="${esc(r.name)}" placeholder="원료명"></td>
          <td style="display:flex;align-items:center;gap:3px;justify-content:flex-end">
            <input type="number" id="ing-wt-${r.id}" value="${dispW || ''}" placeholder="0" min="0" step="any" style="width:80px;text-align:right">
            <select id="ing-un-${r.id}" class="unit-sel" style="width:48px;font-size:12px;padding:2px 2px;background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer">
              <option value="g" ${(!r.unit || r.unit==='g') ? 'selected' : ''}>g</option>
              <option value="kg" ${r.unit==='kg' ? 'selected' : ''}>kg</option>
            </select>
          </td>
          <td style="text-align:center"><input type="checkbox" id="ing-ck-${r.id}" ${r.isUnit ? 'checked' : ''}></td>
          <td style="min-width:70px">
            ${r.isUnit ? `<input type="text" id="ing-uname-${r.id}" value="${esc(r.unitName||'')}" placeholder="단위명(마리,개..)" style="width:90px;font-size:12px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;padding:2px 5px">` : ''}
          </td>
          <td><span class="del-row" data-pid="${p.id}" data-type="ing" data-rid="${r.id}" style="cursor:pointer;color:var(--text3);font-size:16px">×</span></td>
        </tr>`;}).join('')}
        </tbody>
      </table>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="add-row" data-addrow="${p.id}" data-rtype="ing">＋ 원료 추가</span>
        <span class="paste-hint">📋 원료 칸에 커서 두고 Ctrl+V — 원료명↹무게↹생산단위(1) 형식</span>
      </div>

      <div class="slabel">영양제</div>
      <table>
        <thead><tr>
          <th>영양제명</th>
          <th style="text-align:right;width:138px">레시피 무게</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="sup-tbody-${p.id}">
        ${p.supplements.map(r => {
          const dispW = r.unit === 'kg' ? (r.weight / 1000) : r.weight;
          return `<tr>
          <td><input type="text" id="sup-name-${r.id}" value="${esc(r.name)}" placeholder="영양제명"></td>
          <td style="display:flex;align-items:center;gap:3px;justify-content:flex-end">
            <input type="number" id="sup-wt-${r.id}" value="${dispW || ''}" placeholder="0" min="0" step="any" style="width:80px;text-align:right">
            <select id="sup-un-${r.id}" class="unit-sel" style="width:48px;font-size:12px;padding:2px 2px;background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer">
              <option value="g" ${(!r.unit || r.unit==='g') ? 'selected' : ''}>g</option>
              <option value="kg" ${r.unit==='kg' ? 'selected' : ''}>kg</option>
            </select>
          </td>
          <td><span class="del-row" data-pid="${p.id}" data-type="sup" data-rid="${r.id}" style="cursor:pointer;color:var(--text3);font-size:16px">×</span></td>
        </tr>`;}).join('')}
        </tbody>
      </table>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="add-row" data-addrow="${p.id}" data-rtype="sup">＋ 영양제 추가</span>
        <span class="paste-hint">📋 영양제 칸에 커서 두고 Ctrl+V — 영양제명↹무게 형식</span>
      </div>
      ` : ''}
    </div>`;
  }).join('');
}

/* ── 이벤트 위임 (레시피 탭) ── */
document.getElementById('addProductBtn').addEventListener('click', addProduct);

document.getElementById('productList').addEventListener('click', e => {
  // 수정/닫기 버튼
  const editBtn = e.target.closest('[data-edit]');
  if (editBtn) { editProduct(editBtn.dataset.edit); return; }
  // 삭제 버튼
  const removeBtn = e.target.closest('[data-remove]');
  if (removeBtn) { removeProduct(removeBtn.dataset.remove); return; }
  // 행 삭제
  const delRow = e.target.closest('.del-row');
  if (delRow) { removeRow(delRow.dataset.pid, delRow.dataset.type, delRow.dataset.rid); return; }
  // 행 추가
  const addRow = e.target.closest('[data-addrow]');
  if (addRow) { addIngredient(addRow.dataset.addrow, addRow.dataset.rtype); return; }
});

/* ── 붙여넣기 이벤트 ──
   원료/영양제 영역(input, checkbox 등) 어디든 포커스 후 Ctrl+V 하면 감지
   단일 행이면 일반 붙여넣기 허용, 다중 행이면 가로채서 일괄 처리
*/
document.addEventListener('paste', e => {
  const focused = document.activeElement;
  if (!focused) return;
  // 포커스된 요소가 ing-tbody 또는 sup-tbody 안에 있는지 확인
  const tbody = focused.closest('tbody[id]');
  if (!tbody) return;
  const match = tbody.id.match(/^(ing|sup)-tbody-(.+)$/);
  if (!match) return;
  const text = e.clipboardData.getData('text');
  if (!text.includes('\n') && !text.includes('\t')) return; // 단순 한 칸 텍스트는 패스
  e.preventDefault();
  applyPaste(match[2], match[1], text);
});

/* ── 단가 탭 ── */
function syncPriceTab() {
  const ing = new Set(), sup = new Set();
  state.products.forEach(p => {
    p.ingredients.forEach(r => { const nm = priceKey(r.name); if (nm) ing.add(nm); });
    p.supplements.forEach(r => { const nm = priceKey(r.name); if (nm) sup.add(nm); });
  });
  const renderRows = (names, tbodyId, emptyId) => {
    const tbody = document.getElementById(tbodyId);
    const empty = document.getElementById(emptyId);
    if (!names.size) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = Array.from(names).map(nm => {
      const ex = state.prices[nm] || {};
      return `<tr data-name="${esc(nm)}">
        <td style="font-weight:500">${esc(nm)}</td>
        <td><input class="unit-inp" type="number" value="${ex.unit > 0 ? ex.unit : ''}" placeholder="1000" min="0" style="text-align:right"></td>
        <td><input class="price-inp" type="number" value="${ex.hasPrice || ex.price > 0 ? ex.price : ''}" placeholder="0" min="0" style="text-align:right"></td>
      </tr>`;
    }).join('');
  };
  renderRows(ing, 'ingredientPriceTable', 'ingredientPriceEmpty');
  renderRows(sup, 'supplementPriceTable', 'supplementPriceEmpty');
}

/* ── 탭 전환 ── */
function switchTab(tab) {
  collectAllInputs();
  ['recipe', 'price', 'result'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  if (tab === 'price') syncPriceTab();
  if (tab === 'result') renderResultTab();
}
document.getElementById('tabBar').addEventListener('click', e => {
  const t = e.target.dataset.tab;
  if (t) switchTab(t);
});

/* ── 결과 탭 ── */
function renderResultTab() {
  const named = state.products.filter(p => p.name.trim());
  document.getElementById('productChips').innerHTML = named.length
    ? named.map(p => `<button class="chip ${state.selectedProducts.includes(p.id) ? 'selected' : ''}" data-pid="${p.id}">${esc(p.name)}</button>`).join('')
    : '<span class="empty" style="padding:8px 0;display:block">등록된 제품이 없습니다.</span>';
  buildResultCards();
}

// 이벤트 위임으로 chip 클릭 처리
document.addEventListener('click', e => {
  const chip = e.target.closest('#productChips .chip');
  if (chip) { toggleProduct(chip.dataset.pid); }
});

function toggleProduct(pid) {
  collectResultInputs();
  const idx = state.selectedProducts.indexOf(pid);
  if (idx > -1) state.selectedProducts.splice(idx, 1);
  else state.selectedProducts.push(pid);
  renderResultTab();
}

function buildResultCards() {
  const area = document.getElementById('resultArea');
  if (!state.selectedProducts.length) { area.innerHTML = ''; return; }
  const cards = state.selectedProducts.map(pid => {
    const p = state.products.find(x => x.id === pid);
    if (!p) return '';
    const unitIngs = p.ingredients.filter(r => r.isUnit && r.name.trim() && r.weight > 0);
    const hasUnit = unitIngs.length > 0;
    const opt = getResultOption(pid);
    if (hasUnit && !unitIngs.some(r => r.id === opt.unitId)) opt.unitId = unitIngs[0].id;
    const unitOpts = hasUnit
      ? unitIngs.map(r => {
        const dispBase = r.unit === 'kg' ? fmt(r.weight/1000)+(r.unitName||'kg') : fmt(r.weight)+(r.unitName||'g');
        return `<option value="${r.id}" data-base="${r.weight}" data-unitname="${esc(r.unitName||'')}" ${r.id === opt.unitId ? 'selected' : ''}>${esc(r.name)} (기준 ${dispBase})</option>`;
      }).join('') : '';
    const selectedUnit = unitIngs.find(r => r.id === opt.unitId) || unitIngs[0];
    const unitCtrl = hasUnit ? `
      <div class="unit-ctrl">
        <span class="unit-ctrl-label">생산 단위 원료</span>
        <select class="unit-select" id="usel-${pid}" onchange="onUnitChange('${pid}')">${unitOpts}</select>
        <div class="unit-input-wrap">
          <input class="unit-weight-input" type="number" id="uwt-${pid}" value="${esc(opt.weight || '')}" placeholder="0" min="0" step="0.1" oninput="updateCard('${pid}')">
          <span class="unit-weight-unit" id="uwunit-${pid}">${esc(selectedUnit?.unitName || selectedUnit?.unit || "g")}</span>
        </div>
        <span class="ratio-badge" id="uratio-${pid}">× —</span>
      </div>`
      : `<span style="font-size:12px;color:var(--text3)">생산단위 원료 미설정 — 레시피 1배치 기준</span>`;
    return `<div class="rcard" id="rcard-${pid}">
      <div class="rcard-head">
        <div class="rcard-name">${esc(p.name)}</div>
        ${unitCtrl}
      </div>
      <div style="padding:6px 18px 0;display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="suponly-${pid}" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent)" onchange="updateCard('${pid}')" ${opt.supplementOnly ? 'checked' : ''}>
        <label for="suponly-${pid}" style="font-size:12px;color:var(--text2);cursor:pointer;user-select:none">영양제만 보기</label>
      </div>
      <div class="rcard-body" id="rbody-${pid}"></div>
      <div class="rcard-foot" id="rfoot-${pid}"></div>
    </div>`;
  }).join('');
  area.innerHTML = `<div class="result-grid">${cards}</div><div class="grand" id="grand"></div>`;
  state.selectedProducts.forEach(pid => updateCard(pid));
}

function onUnitChange(pid) {
  const sel = document.getElementById('usel-' + pid);
  const wt  = document.getElementById('uwt-' + pid);
  const ut  = document.getElementById('uwunit-' + pid);
  const opt = getResultOption(pid);
  if (sel && wt) {
    opt.unitId = sel.value;
    const base    = parseFloat(sel.selectedOptions[0]?.dataset.base) || 0;
    // 선택된 원료의 unit 찾기
    const p = state.products.find(x=>x.id===pid);
    const selIng = p?.ingredients.find(r=>r.id===sel.value);
    const unit = selIng?.unit || 'g';
    const dispBase = unit==='kg' ? fmt(base/1000) : fmt(base);
    wt.placeholder = dispBase || '0';
    // select 옵션 텍스트도 uname 반영 (이미 렌더 시 반영됨)
    if (ut) ut.textContent = selIng?.unitName || unit;
  }
  updateCard(pid);
}

function getRatio(pid) {
  const p = state.products.find(x => x.id === pid);
  if (!p) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const unitIngs = p.ingredients.filter(r => r.isUnit && r.name.trim() && r.weight > 0);
  if (!unitIngs.length) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const sel   = document.getElementById('usel-' + pid);
  const wtEl  = document.getElementById('uwt-' + pid);
  const selId = sel?.value;
  const inputRaw = parseFloat(wtEl?.value) || 0; // 화면 입력값 (표시 단위)
  const selIng = p.ingredients.find(r => r.id === selId);
  if (!selIng || selIng.weight <= 0) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const unit = selIng.unit || 'g';
  const inputWg = unit === 'kg' ? inputRaw * 1000 : inputRaw; // g으로 변환해서 ratio 계산
  if (inputRaw <= 0) return { ratio:1, baseW:selIng.weight, inputW:0, inputRaw:0, unitName:selIng.name, hasInput:false, unitDisp:unit, uname:selIng.unitName||'' };
  const uname = selIng.unitName || '';
  // 단위명 있으면: 입력값 = 몇 마리(배치 수) → ratio = inputRaw
  // 단위명 없으면: 입력값 = 중량 → ratio = inputWg / baseWeight
  const ratio = uname ? inputRaw : inputWg / selIng.weight;
  return { ratio, baseW: selIng.weight, inputW: uname ? inputRaw * selIng.weight : inputWg, inputRaw, unitName: selIng.name, hasInput: true, unitDisp: unit, uname };
}

function updateCard(pid) {
  const p = state.products.find(x => x.id === pid);
  if (!p) return;
  const opt = getResultOption(pid);
  const sel = document.getElementById('usel-' + pid);
  const wt = document.getElementById('uwt-' + pid);
  const supOnlyEl = document.getElementById('suponly-' + pid);
  if (sel) opt.unitId = sel.value;
  if (wt) opt.weight = wt.value;
  if (supOnlyEl) opt.supplementOnly = supOnlyEl.checked;
  const { ratio, baseW, inputW, inputRaw, unitName, hasInput, unitDisp, uname } = getRatio(pid);
  const rb = document.getElementById('uratio-' + pid);
  if (rb) rb.textContent = hasInput ? `× ${fmt(ratio)}` : '× —';

  const supOnly = document.getElementById('suponly-' + pid)?.checked || false;
  const allRows = [
    ...(supOnly ? [] : p.ingredients.map(r => ({...r, kind:'ing'}))),
    ...p.supplements.map(r => ({...r, kind:'sup'}))
  ].filter(r => r.name.trim() && r.weight > 0);

  let totalW = 0, totalC = 0;
  const rows = allRows.map(r => {
    const scaledW = r.weight * ratio;
    const pd = state.prices[priceKey(r.name)] || {};
    const hasPrice = pd.unit > 0 && (pd.hasPrice || pd.price > 0);
    const cost = hasPrice ? (scaledW / pd.unit) * pd.price : 0;
    totalW += scaledW; totalC += cost;
    const kindBadge = r.kind === 'ing'
      ? `<span class="tkind ${r.isUnit ? 'k-unit' : 'k-ing'}">${r.isUnit ? '생산단위' : '원료'}</span>`
      : `<span class="tkind k-sup">영양제</span>`;
    const costCell = hasPrice
      ? `<td class="cost">${Math.round(cost).toLocaleString()}원</td>`
      : `<td class="cost-na">미입력</td>`;
    // 표시 단위: 레시피 입력 단위 그대로
    const dispW = r.unit === 'kg' ? fmt(scaledW/1000)+'kg' : fmt(scaledW)+'g';
    return `<tr>
      <td>${esc(r.name)}${kindBadge}</td>
      <td class="wt">${dispW}</td>
      ${costCell}
    </tr>`;
  }).join('');

  document.getElementById('rbody-' + pid).innerHTML = `
    <table class="rt">
      <thead><tr><th>원료 / 영양제</th><th class="num">중량</th><th class="num">원가</th></tr></thead>
      <tbody>
        ${rows || '<tr><td colspan="3" style="color:var(--text3);font-size:12px;padding:12px 6px">입력된 원료가 없습니다.</td></tr>'}
        <tr class="subtotal">
          <td>합계</td>
          <td class="num">${fmt(totalW)}g</td>
          <td class="num">${Math.round(totalC).toLocaleString()}원</td>
        </tr>
      </tbody>
    </table>`;

  const dispUnit = uname || (unitDisp==='kg' ? 'kg' : 'g');
  const baseDisp = uname ? fmt(baseW/(unitDisp==='kg'?1000:1))+(unitDisp==='kg'?'kg':'g')+'/'+uname : (unitDisp==='kg' ? fmt(baseW/1000)+'kg' : fmt(baseW)+'g');
  const inDisp   = fmt(inputRaw) + dispUnit;
  const footDesc = hasInput
    ? `${esc(unitName)} ${inDisp} 입력 (기준 ${baseDisp} → × ${fmt(ratio)})`
    : unitName ? `${esc(unitName)} 중량 입력 전 — 레시피 기준` : '레시피 1배치 기준';

  document.getElementById('rfoot-' + pid).innerHTML = `
    <div class="foot-desc">${footDesc}</div>
    <div class="foot-item"><div class="foot-label">총 중량</div><div class="foot-val">${fmt(totalW)}g</div></div>
    <div class="foot-item"><div class="foot-label">총 원가</div><div class="foot-val">${Math.round(totalC).toLocaleString()}원</div></div>`;

  updateGrand();
}

function updateGrand() {
  let gW = 0, gC = 0;
  state.selectedProducts.forEach(pid => {
    const p = state.products.find(x => x.id === pid);
    if (!p) return;
    const { ratio } = getRatio(pid);
    [...p.ingredients, ...p.supplements].forEach(r => {
      if (!r.name.trim() || r.weight <= 0) return;
      const sw = r.weight * ratio; gW += sw;
      const pd = state.prices[priceKey(r.name)] || {};
      if (pd.unit > 0 && (pd.hasPrice || pd.price > 0)) gC += (sw / pd.unit) * pd.price;
    });
  });
  const el = document.getElementById('grand');
  if (!el) return;
  el.innerHTML = `
    <div class="grand-title">전체 합계 (선택 제품)</div>
    <div class="grand-grid">
      <div class="metric"><div class="metric-label">총 중량</div><div class="metric-value">${fmt(gW)}g</div></div>
      <div class="metric"><div class="metric-label">총 원가</div><div class="metric-value">${Math.round(gC).toLocaleString()}원</div></div>
    </div>`;
}

/* ── 초기화 ── */
loadData();
renderProducts();
syncPriceTab();
window.addEventListener('beforeunload', () => {
  collectAllInputs();
  localStorage.setItem('rcd6', JSON.stringify(state));
});
</script>

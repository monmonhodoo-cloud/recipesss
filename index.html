function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function priceKey(s) { return String(s || '').trim(); }
function fmt(n) { const v = Math.round(n * 100) / 100; return v % 1 === 0 ? v.toLocaleString() : v.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:2}); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

function downloadData() {
  collectAllInputs();

}

function collectAllInputs() {
  state.products.forEach(p => {
    const el = document.getElementById('pname-' + p.id);
    if (el) p.name = el.value;
    p.ingredients.forEach(r => {
      const nm = document.getElementById('ing-name-' + r.id);
      const wt = document.getElementById('ing-wt-' + r.id);
      const ck = document.getElementById('ing-ck-' + r.id);
      const un = document.getElementById('ing-un-' + r.id);
      const uname = document.getElementById('ing-uname-' + r.id);
      if (nm) r.name = nm.value;
      if (un) r.unit = un.value;
      if (wt) {
        const raw = parseFloat(wt.value) || 0;
        r.weight = (r.unit === 'kg') ? raw * 1000 : raw;
        r.displayWeight = raw;
      }
      if (ck) r.isUnit = ck.checked;
      if (uname) r.unitName = uname.value.trim();
      else if (!r.isUnit) r.unitName = '';
    });
    p.supplements.forEach(r => {
      const nm = document.getElementById('sup-name-' + r.id);
      const alias = document.getElementById('sup-alias-' + r.id);
      const wt = document.getElementById('sup-wt-' + r.id);
      const un = document.getElementById('sup-un-' + r.id);
      if (nm) r.name = nm.value;
      if (alias) r.alias = alias.value.trim();
      if (un) r.unit = un.value;
      if (wt) {
        const raw = parseFloat(wt.value) || 0;
        r.weight = (r.unit === 'kg') ? raw * 1000 : raw;
        r.displayWeight = raw;
      }
    });
  });
  collectPrices();
  collectResultInputs();
}

function getResultOption(pid) {
  if (!state.resultOptions) state.resultOptions = {};
  if (!state.resultOptions[pid]) state.resultOptions[pid] = { unitId: '', weight: '', supplementOnly: false, presetLabel: '' };
  return state.resultOptions[pid];
}

function collectResultInputs() {
  if (!state.resultOptions) state.resultOptions = {};
  state.selectedProducts.forEach(pid => {
    const opt = getResultOption(pid);
    const sel = document.getElementById('usel-' + pid);
    const wt = document.getElementById('uwt-' + pid);
    const supOnly = document.getElementById('suponly-' + pid);
    const presetLabel = document.getElementById('preset-label-' + pid);
    if (sel) opt.unitId = sel.value;
    if (wt) opt.weight = wt.value;
    if (supOnly) opt.supplementOnly = supOnly.checked;
    if (presetLabel) opt.presetLabel = presetLabel.value.trim();
  });
}
function collectPrices() {
  document.querySelectorAll('#ingredientPriceTable tr[data-name], #supplementPriceTable tr[data-name]').forEach(tr => {
    const nm = priceKey(tr.dataset.name);
    if (!nm) return;
    const unitValue = tr.querySelector('.unit-inp')?.value.trim() || '';
    const priceValue = tr.querySelector('.price-inp')?.value.trim() || '';
    const hasPrice = priceValue !== '';
    if (!state.prices[nm]) state.prices[nm] = {};
    state.prices[nm].unit  = parseFloat(unitValue) || (hasPrice ? 1000 : 0);
    state.prices[nm].price = hasPrice ? (parseFloat(priceValue) || 0) : 0;
    state.prices[nm].hasPrice = hasPrice;
  });
}

/* ?? ?묒? 遺숈뿬?ｊ린 ?뚯떛 ??
   ?뺤떇: ?먮즺紐?t臾닿쾶\t?앹궛?⑥쐞 (3而щ읆)
   ?앹궛?⑥쐞 而щ읆: 1, y, o, ?? v, ???깆씠硫?泥댄겕
*/
function parseExcelPaste(text) {
  const rows = text.trim().split(/\r?\n/).map(row => row.split('\t'));
  const result = [];
  rows.forEach(cols => {
    const name    = (cols[0] || '').trim();
    const weight  = parseFloat((cols[1] || '').trim().replace(/,/g, ''));
    const unitRaw = (cols[2] || '').trim().toLowerCase();
    const isUnit  = ['1','y','yes','true','o','??,'v','??,'泥댄겕'].includes(unitRaw);
    if (name && !isNaN(weight) && weight > 0) {
      result.push({ name, weight, isUnit });
    }
  });
  return result;
}

function applyPaste(pid, type, text) {
  const parsed = parseExcelPaste(text);
  if (!parsed.length) { showToast('遺숈뿬?ｌ쓣 ?곗씠???놁쓬. ?뺤떇: ?먮즺紐끸넿臾닿쾶?뱀깮?곕떒??1 ?먮뒗 鍮덉뭏)'); return; }
  collectAllInputs();
  const p = state.products.find(p => p.id === pid);
  if (!p) return;
  const arr = type === 'ing' ? p.ingredients : p.supplements;
  const filtered = arr.filter(r => r.name.trim() || r.weight > 0);
  parsed.forEach(item => {
    filtered.push({ id: uid(), name: item.name, alias: '', weight: item.weight, unit: 'g', isUnit: type === 'ing' ? item.isUnit : false });
  });
  if (type === 'ing') p.ingredients = filtered;
  else p.supplements = filtered;
  renderProducts();
  syncPriceTab();
  showToast(`${parsed.length}媛???遺숈뿬?ｊ린 ?꾨즺`);
}

document.addEventListener('paste', e => {
  const focused = document.activeElement;
  if (!focused) return;
  // ?ъ빱?ㅻ맂 ?붿냼媛 ing-tbody ?먮뒗 sup-tbody ?덉뿉 ?덈뒗吏 ?뺤씤
  const tbody = focused.closest('tbody[id]');
  if (!tbody) return;
  const match = tbody.id.match(/^(ing|sup)-tbody-(.+)$/);
  if (!match) return;
  const text = e.clipboardData.getData('text');
  if (!text.includes('\n') && !text.includes('\t')) return; // ?⑥닚 ??移??띿뒪?몃뒗 ?⑥뒪
  e.preventDefault();
  applyPaste(match[2], match[1], text);
});

function syncPriceTab() {
  const ing = new Set(), sup = new Set();
  state.products.forEach(p => {
    p.ingredients.forEach(r => { const nm = priceKey(r.name); if (nm) ing.add(nm); });
    p.supplements.forEach(r => { const nm = priceKey(r.name); if (nm) sup.add(nm); });
  });
  const renderRows = (names, tbodyId, emptyId) => {
    const tbody = document.getElementById(tbodyId);
    const empty = document.getElementById(emptyId);
    if (!names.size) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = Array.from(names).map(nm => {
      const ex = state.prices[nm] || {};
      return `<tr data-name="${esc(nm)}">
        <td style="font-weight:500">${esc(nm)}</td>
        <td><input class="unit-inp" type="number" value="${ex.unit > 0 ? ex.unit : ''}" placeholder="1000" min="0" style="text-align:right"></td>
        <td><input class="price-inp" type="number" value="${ex.hasPrice || ex.price > 0 ? ex.price : ''}" placeholder="0" min="0" style="text-align:right"></td>
      </tr>`;
    }).join('');
  };
  renderRows(ing, 'ingredientPriceTable', 'ingredientPriceEmpty');
  renderRows(sup, 'supplementPriceTable', 'supplementPriceEmpty');
}

function switchTab(tab) {
  collectAllInputs();
  ['recipe', 'price', 'result', 'order', 'preview'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  if (tab === 'price') syncPriceTab();
  if (tab === 'result') renderResultTab();
  if (tab === 'order') { renderPresetGrid(); renderOrderTab(); renderSupMapTable(); }
}
document.getElementById('tabBar').addEventListener('click', e => {
  const t = e.target.dataset.tab;
  if (t) switchTab(t);
});

function buildResultCards() {
  const area = document.getElementById('resultArea');
  if (!state.selectedProducts.length) { area.innerHTML = ''; return; }
  const cards = state.selectedProducts.map(pid => {
    const p = state.products.find(x => x.id === pid);
    if (!p) return '';
    const unitIngs = p.ingredients.filter(r => r.isUnit && r.name.trim() && r.weight > 0);
    const hasUnit = unitIngs.length > 0;
    const opt = getResultOption(pid);
    if (hasUnit && !unitIngs.some(r => r.id === opt.unitId)) opt.unitId = unitIngs[0].id;
    const unitOpts = hasUnit
      ? unitIngs.map(r => {
        const dispBase = r.unit === 'kg' ? fmt(r.weight/1000)+(r.unitName||'kg') : fmt(r.weight)+(r.unitName||'g');
        return `<option value="${r.id}" data-base="${r.weight}" data-unitname="${esc(r.unitName||'')}" ${r.id === opt.unitId ? 'selected' : ''}>${esc(r.name)} (湲곗? ${dispBase})</option>`;
      }).join('') : '';
    const selectedUnit = unitIngs.find(r => r.id === opt.unitId) || unitIngs[0];
    const unitCtrl = hasUnit ? `
      <div class="unit-ctrl">
        <span class="unit-ctrl-label">?앹궛 ?⑥쐞 ?먮즺</span>
        <select class="unit-select" id="usel-${pid}" onchange="onUnitChange('${pid}')">${unitOpts}</select>
        <div class="unit-input-wrap">
          <input class="unit-weight-input" type="number" id="uwt-${pid}" value="${esc(opt.weight || '')}" placeholder="0" min="0" step="0.1" oninput="updateCard('${pid}')">
          <span class="unit-weight-unit" id="uwunit-${pid}">${esc(selectedUnit?.unitName || selectedUnit?.unit || "g")}</span>
        </div>

function getRatio(pid) {
  const p = state.products.find(x => x.id === pid);
  if (!p) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const unitIngs = p.ingredients.filter(r => r.isUnit && r.name.trim() && r.weight > 0);
  if (!unitIngs.length) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const sel   = document.getElementById('usel-' + pid);
  const wtEl  = document.getElementById('uwt-' + pid);
  const selId = sel?.value;
  const inputRaw = parseFloat(wtEl?.value) || 0; // ?붾㈃ ?낅젰媛?(?쒖떆 ?⑥쐞)
  const selIng = p.ingredients.find(r => r.id === selId);
  if (!selIng || selIng.weight <= 0) return { ratio:1, baseW:0, inputW:0, unitName:'', hasInput:false, unitDisp:'g', uname:'' };
  const unit = selIng.unit || 'g';
  const inputWg = unit === 'kg' ? inputRaw * 1000 : inputRaw; // g?쇰줈 蹂?섑빐??ratio 怨꾩궛
  if (inputRaw <= 0) return { ratio:1, baseW:selIng.weight, inputW:0, inputRaw:0, unitName:selIng.name, hasInput:false, unitDisp:unit, uname:selIng.unitName||'' };
  const uname = selIng.unitName || '';
  // ?⑥쐞紐??덉쑝硫? ?낅젰媛?= 紐?留덈━(諛곗튂 ?? ??ratio = inputRaw
  // ?⑥쐞紐??놁쑝硫? ?낅젰媛?= 以묐웾 ??ratio = inputWg / baseWeight
  const ratio = uname ? inputRaw : inputWg / selIng.weight;
  return { ratio, baseW: selIng.weight, inputW: uname ? inputRaw * selIng.weight : inputWg, inputRaw, unitName: selIng.name, hasInput: true, unitDisp: unit, uname };
}

    const costCell = hasPrice

    // ?쒖떆 ?⑥쐞: ?덉떆???낅젰 ?⑥쐞 洹몃?濡?    const dispW = r.unit === 'kg' ? fmt(scaledW/1000)+'kg' : fmt(scaledW)+'g';
    return `<tr>

  document.getElementById('rbody-' + pid).innerHTML = `
    <table class="rt">
      <thead><tr><th>?먮즺 / ?곸뼇??/th><th class="num">以묐웾</th><th class="num">?먭?</th></tr></thead>
      <tbody>

        <tr class="subtotal">

          <td class="num">${fmt(totalW)}g</td>
          <td class="num">${Math.round(totalC).toLocaleString()}??/td>
        </tr>
      </tbody>
    </table>`;

  const dispUnit = uname || (unitDisp==='kg' ? 'kg' : 'g');
  const baseDisp = uname ? fmt(baseW/(unitDisp==='kg'?1000:1))+(unitDisp==='kg'?'kg':'g')+'/'+uname : (unitDisp==='kg' ? fmt(baseW/1000)+'kg' : fmt(baseW)+'g');
  const inDisp   = fmt(inputRaw) + dispUnit;
  const footDesc = hasInput
    ? `${esc(unitName)} ${inDisp} ?낅젰 (湲곗? ${baseDisp} ??횞 ${fmt(ratio)})`
    : unitName ? `${esc(unitName)} 以묐웾 ?낅젰 ?????덉떆??湲곗?` : '?덉떆??1諛곗튂 湲곗?';

  document.getElementById('rfoot-' + pid).innerHTML = `

    <div class="foot-item"><div class="foot-label">珥??먭?</div><div class="foot-val">${Math.round(totalC).toLocaleString()}??/div></div>`;

  updateGrand();

function updateGrand() {
  let gW = 0, gC = 0;
  state.selectedProducts.forEach(pid => {
    const p = state.products.find(x => x.id === pid);
    if (!p) return;
    const { ratio } = getRatio(pid);
    [...p.ingredients, ...p.supplements].forEach(r => {
      if (!r.name.trim() || r.weight <= 0) return;
      const sw = r.weight * ratio; gW += sw;
      const pd = state.prices[priceKey(r.name)] || {};
      if (pd.unit > 0 && (pd.hasPrice || pd.price > 0)) gC += (sw / pd.unit) * pd.price;
    });
  });
  const el = document.getElementById('grand');
  if (!el) return;
  el.innerHTML = `
    <div class="grand-title">?꾩껜 ?⑷퀎 (?좏깮 ?쒗뭹)</div>
    <div class="grand-grid">
      <div class="metric"><div class="metric-label">珥?以묐웾</div><div class="metric-value">${fmt(gW)}g</div></div>
      <div class="metric"><div class="metric-label">珥??먭?</div><div class="metric-value">${Math.round(gC).toLocaleString()}??/div></div>
    </div>`;
}


/* ?? 諛쒖＜ ?듯빀 ?? */
function jsString(s) { return JSON.stringify(String(s || '')).replace(/</g, '\u003c'); }
function orderWeightKey(w) { return String(Math.round((Number(w) || 0) * 100) / 100); }
function fmtPresetWeight(w) {
  const n = Number(w) || 0;
  return n >= 1000 && n % 1000 === 0 ? fmt(n / 1000) + 'kg' : fmt(n) + 'g';
}
function fmtPresetWeightName(w) {
  const n = Number(w) || 0;
  if (n >= 1000 && n % 1000 === 0) return String(Math.round(n / 1000)).padStart(2, '0') + 'KG';
  return String(Math.round(n)).padStart(2, '0') + 'G';
}
function buildPresetDisplayName(productName, weight, label) {
  return `${productName} ${fmtPresetWeightName(weight)}${label ? ' ' + label : ''}`.trim();
}
function getProductPrefix(productName) {
  if (PRODUCT_CODE_PREFIX[productName]) return PRODUCT_CODE_PREFIX[productName];
  const idx = state.products.findIndex(p => p.name.trim() === productName);
  return idx >= 0 && idx < 26 ? String.fromCharCode(65 + idx) : `P${idx + 1}`;
}
function getProductByName(productName) {
  return state.products.find(p => p.name.trim() === productName);
}
function getSupplementAlias(row) {
  return (row?.alias || '').trim() || (SUP_MAP[row?.name] || row?.name || '').trim();
}
function normalizePresetList(productName, list) {
  const prefix = getProductPrefix(productName);
  const normalized = (Array.isArray(list) ? list : []).map((entry, index) => {
    const weight = Number(typeof entry === 'object' ? (entry.weight ?? entry.grams ?? entry.value) : entry);
    if (!weight || weight <= 0) return null;
    return {
      code: typeof entry === 'object' ? String(entry.code || '').trim() : '',
      label: typeof entry === 'object' ? String(entry.label || '').trim() : '',
      unitId: typeof entry === 'object' ? String(entry.unitId || '').trim() : '',
      weight: Number(orderWeightKey(weight)),
      sortIndex: index
    };
  }).filter(Boolean).sort((a, b) => a.weight - b.weight || a.sortIndex - b.sortIndex);
  const seen = new Set();
  return normalized.filter(entry => {
    const key = `${orderWeightKey(entry.weight)}__${entry.label || ''}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).map((entry, index) => ({
    code: entry.code || `${prefix}${index}`,
    label: entry.label || '',
    unitId: entry.unitId || '',
    weight: entry.weight,
    displayName: buildPresetDisplayName(productName, entry.weight, entry.label || '')
  }));
}
function loadOrderData() {
  try {
    const d = JSON.parse(localStorage.getItem('order_data') || '{}');
    orderPresets = d.presets || {};
    orderData = d.orderData || {};
  } catch(e) {
    orderPresets = {};
    orderData = {};
  }
  Object.keys(orderPresets).forEach(productName => {
    orderPresets[productName] = normalizePresetList(productName, orderPresets[productName]);
    const migrated = {};
    Object.entries(orderData[productName] || {}).forEach(([key, value]) => {
      const preset = orderPresets[productName].find(entry => entry.code === key || orderWeightKey(entry.weight) === orderWeightKey(key));
      migrated[preset?.code || key] = value;
    });
    if (Object.keys(migrated).length) orderData[productName] = migrated;
  });
}
function saveOrderData(silent=false) {
  localStorage.setItem('order_data', JSON.stringify({ presets: orderPresets, orderData }));
  if (!silent) showToast('발주 데이터 저장 완료!');
}
function getPresetEntries(productName) {
  orderPresets[productName] = normalizePresetList(productName, orderPresets[productName]);
  return orderPresets[productName];
}
function getPresetStorageKey(preset) {
  return preset?.code || orderWeightKey(preset?.weight);
}
function getPresetRatio(product, preset) {
  if (!product || !preset) return 1;
  const unitIngs = (product.ingredients || []).filter(r => r.isUnit && r.name.trim() && r.weight > 0);
  const selected = unitIngs.find(r => r.id === preset.unitId) || unitIngs[0];
  if (!selected || !selected.weight) return 1;
  return preset.weight / selected.weight;
}
function getPresetSupplementWeight(product, preset, supplementName) {
  if (!product || !preset) return 0;
  const row = (product.supplements || []).find(r => r.name.trim() === supplementName);
  if (!row || !row.weight) return 0;
  return row.weight * getPresetRatio(product, preset);
}
function saveResultPreset(pid) {
  updateCard(pid);
  const p = state.products.find(x => x.id === pid);
  if (!p || !p.name.trim()) { showToast('제품명이 필요합니다.'); return; }
  const ratioInfo = getRatio(pid);
  if (!ratioInfo.hasInput || !ratioInfo.inputW) { showToast('먼저 결과 중량을 입력하세요.'); return; }
  const opt = getResultOption(pid);
  const label = (opt.presetLabel || '').trim();
  const weightKey = orderWeightKey(ratioInfo.inputW);
  const current = getPresetEntries(p.name.trim()).slice();
  current.push({ weight: Number(weightKey), label, unitId: opt.unitId || '' });
  orderPresets[p.name.trim()] = normalizePresetList(p.name.trim(), current);
  const preset = [...orderPresets[p.name.trim()]].reverse().find(entry => orderWeightKey(entry.weight) === weightKey && (entry.label || '') === label) || orderPresets[p.name.trim()][0];
  saveOrderData(true);
  renderPresetGrid();
  renderOrderTab();
  showToast(`${preset.displayName} 저장`);
}

}

function setOrderVal(productName, presetCode, supName, val) {

function generatePreview() {

    previewHtml += `<div class="preview-box" style="margin-bottom:16px">${section}</div>`;
    printHtml += `<div class="print-section">${section}</div>`;
  }

        return `${esc(getSupplementAlias(sup || { name: r.supName }))} ${r.qty}`;
      }).join(' / ');
      return `<tr><td>${esc(code)}</td><td class="left">${esc(first.productName)} ${fmtPresetWeight(first.weight)}</td><td class="left">${items}</td></tr>`;
    }).join('');
    const section = `<div class="preview-section"><div class="preview-title">영양제 발주 목록</div><div class="preview-sub">${today}</div><table class="pv-table"><thead><tr><th style="width:18%">코드</th><th class="left" style="width:32%">제품/규격</th><th class="left">영양제/수량</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    previewHtml += `<div class="preview-box">${section}</div>`;
    printHtml += `<div class="print-section">${section}</div>`;
  }
  document.getElementById('previewArea').innerHTML = previewHtml;
  document.getElementById('printWrapper').innerHTML = printHtml;
  switchTab('preview');
}/* ?? 珥덇린???? */

});

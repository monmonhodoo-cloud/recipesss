<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레시피 원가 계산기</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #efece6;
    --text: #191816;
    --text2: #6a6864;
    --text3: #9b9791;
    --border: rgba(0, 0, 0, 0.1);
    --border2: rgba(0, 0, 0, 0.18);
    --accent: #1d1c19;
    --accentText: #ffffff;
    --infoBg: #e8f0fb;
    --infoText: #1a4fa0;
    --warnBg: #fff7dd;
    --warnText: #8a6200;
    --radius: 10px;
    --radiusLg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0ede8;
      --text2: #a0a09c;
      --text3: #6a6a66;
      --border: rgba(255, 255, 255, 0.1);
      --border2: rgba(255, 255, 255, 0.18);
      --accent: #f0ede8;
      --accentText: #1c1c1a;
      --infoBg: #0f2a50;
      --infoText: #7aabf0;
      --warnBg: #2f2403;
      --warnText: #f0c040;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg3);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }
  button, input, select {
    font: inherit;
  }
  .app-header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .app-title { font-size: 15px; font-weight: 600; }
  .app-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-btns { display: flex; gap: 8px; align-items: center; }
  .container { max-width: 1440px; margin: 0 auto; padding: 20px 16px 60px; }
  .tab-bar {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 4px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radiusLg);
    padding: 4px;
    margin-bottom: 20px;
  }
  .tab {
    padding: 11px 10px;
    text-align: center;
    border-radius: 10px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 600;
  }
  .tab.active { background: var(--accent); color: var(--accentText); }
  .top-bar, .section-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .count-badge, .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text2);
    font-size: 12px;
  }
  .card, .rcard, .panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radiusLg);
  }
  .card { padding: 18px 20px; margin-bottom: 14px; }
  .panel { padding: 16px 18px; }
  .btn, .save-btn, .download-btn {
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 10px;
    padding: 8px 14px;
  }
  .btn-primary, .save-btn {
    background: var(--accent);
    color: var(--accentText);
    border-color: var(--accent);
  }
  .btn-danger {
    color: #c03c2f;
    border-color: rgba(192, 60, 47, 0.3);
    background: transparent;
  }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .product-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    align-items: start;
  }
  .product-list .card { margin-bottom: 0; }
  .card.editing { grid-column: 1 / -1; }
  .card.collapsed { padding: 14px 16px; cursor: pointer; }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .product-summary { flex: 1; min-width: 0; }
  .product-title {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .product-actions { display: flex; gap: 8px; align-items: center; }
  .product-name-input {
    width: min(420px, 100%);
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    outline: none;
  }
  .slabel {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 12px 0 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border-bottom: 0.5px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: middle;
  }
  th {
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
  }
  td input[type="text"], td input[type="number"], td select {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    border-radius: 6px;
    padding: 5px 6px;
  }
  td input:focus, td select:focus { background: var(--bg2); }
  td input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }
  .inline-weight {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: flex-end;
  }
  .inline-weight input { width: 82px; text-align: right; }
  .inline-weight select { width: 56px; }
  .add-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
    cursor: pointer;
    padding: 6px 4px;
    border-radius: 8px;
  }
  .add-row:hover { color: var(--text); }
  .paste-hint {
    color: var(--text3);
    font-size: 11px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 0.5px solid var(--border2);
    border-radius: 999px;
    padding: 7px 14px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .chip.selected { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
  }
  .rcard { overflow: hidden; }
  .rcard-head { padding: 14px 18px 12px; border-bottom: 0.5px solid var(--border); }
  .rcard-name { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .unit-ctrl {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .unit-select {
    max-width: 220px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 10px;
  }
  .unit-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 4px 10px;
  }
  .unit-weight-input {
    width: 80px;
    border: none;
    background: transparent;
    color: var(--text);
    text-align: right;
    outline: none;
  }
  .ratio-badge {
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--infoBg);
    color: var(--infoText);
    font-size: 12px;
    font-weight: 700;
  }
  .result-actions {
    padding: 0 18px 10px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .rcard-body { padding: 4px 18px 12px; }
  .rcard-foot {
    padding: 10px 18px 12px;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .foot-item { text-align: right; }
  .foot-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .foot-val { font-size: 18px; font-weight: 800; }
  .grand { margin-top: 18px; }
  .grand-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .metric {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .metric-label { color: var(--text2); font-size: 12px; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 800; }
  .order-layout {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 14px;
    align-items: start;
  }
  .info-box {
    background: var(--infoBg);
    color: var(--infoText);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .preset-grid { display: grid; gap: 8px; }
  .preset-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .preset-card-name {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .preset-lines { display: grid; gap: 6px; }
  .preset-line { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .order-product-row {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .order-product-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .order-product-name { font-size: 14px; font-weight: 700; }
  .order-table-wrap {
    overflow-x: auto;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 10px;
  }
  .order-table-wrap table { min-width: 720px; }
  .order-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .order-cell-grams { font-size: 12px; font-weight: 700; }
  .order-cell-sub { font-size: 10px; color: var(--text3); }
  .order-cell-input {
    width: 74px;
    border: 0.5px solid var(--border);
    background: var(--bg2);
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
  }
  .preview-box {
    background: white;
    color: #111;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .preview-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    border-bottom: 1.5px solid #111;
    padding-bottom: 4px;
  }
  .preview-sub { font-size: 10px; color: #555; margin-bottom: 10px; }
  .pv-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
  }
  .pv-table th, .pv-table td {
    border: 0.5px solid #bbb;
    padding: 4px 5px;
    text-align: center;
    color: #111;
  }
  .pv-table th.left, .pv-table td.left { text-align: left; }
  .empty {
    color: var(--text3);
    text-align: center;
    padding: 24px;
    font-size: 13px;
  }
  .toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--accentText);
    border-radius: 999px;
    padding: 10px 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; }
  .hidden { display: none !important; }
  @media (max-width: 1080px) {
    .order-layout { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .tab-bar { grid-template-columns: 1fr; }
    .product-list { grid-template-columns: 1fr; }
    .grand-grid { grid-template-columns: 1fr; }
    .app-header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title">레시피 원가 계산기</div>
    <div class="app-sub">데이터는 브라우저에 자동 저장됩니다</div>
  </div>
  <div class="header-btns">
    <button class="download-btn" onclick="downloadData()">다운로드</button>
    <button class="save-btn" onclick="saveData()">저장</button>
  </div>
</header>

<div class="container">
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="recipe">레시피</div>
    <div class="tab" data-tab="price">단가</div>
    <div class="tab" data-tab="result">결과</div>
    <div class="tab" data-tab="order">발주</div>
    <div class="tab" data-tab="preview">출력</div>
  </div>

  <div id="tab-recipe">
    <div class="top-bar">
      <span class="count-badge">제품 <span id="productCount">0</span>개</span>
      <button class="btn btn-primary" id="addProductBtn">제품 추가</button>
    </div>
    <div id="productList"></div>
  </div>

  <div id="tab-price" class="hidden">
    <div class="card">
      <div class="slabel" style="margin-top:0">원료 단가</div>
      <table>
        <thead><tr><th>원료명</th><th style="text-align:right">단위 (g)</th><th style="text-align:right">단가 (원)</th></tr></thead>
        <tbody id="ingredientPriceTable"></tbody>
      </table>
      <div id="ingredientPriceEmpty" class="empty">레시피 탭에서 원료를 먼저 입력해 주세요.</div>
    </div>
    <div class="card">
      <div class="slabel" style="margin-top:0">영양제 단가</div>
      <table>
        <thead><tr><th>영양제명</th><th style="text-align:right">단위 (g)</th><th style="text-align:right">단가 (원)</th></tr></thead>
        <tbody id="supplementPriceTable"></tbody>
      </table>
      <div id="supplementPriceEmpty" class="empty">레시피 탭에서 영양제를 먼저 입력해 주세요.</div>
    </div>
  </div>

  <div id="tab-result" class="hidden">
    <div class="card">
      <div class="slabel" style="margin-top:0">제품 선택</div>
      <div id="productChips" class="chip-row"></div>
    </div>
    <div id="resultArea"></div>
  </div>

  <div id="tab-order" class="hidden">
    <div class="order-layout">
      <div class="panel">
        <div class="section-row">
          <div class="slabel" style="margin:0">발주 프리셋</div>
          <button class="btn btn-sm" onclick="clearAllPresets()">전체 초기화</button>
        </div>
        <div class="info-box">결과 탭에서 중량과 프리셋명을 입력하고 저장하면 여기에서 바로 사용할 수 있습니다.</div>
        <div id="presetGrid" class="preset-grid"></div>
        <div class="slabel">영양제 치환명</div>
        <table>
          <thead><tr><th>원래 이름</th><th>치환명</th></tr></thead>
          <tbody id="supMapTable"></tbody>
        </table>
      </div>
      <div class="panel">
        <div class="section-row">
          <div class="slabel" style="margin:0">부족 수량 입력</div>
          <button class="btn btn-primary" onclick="generatePreview()">출력 미리보기 생성</button>
        </div>
        <div id="orderArea"></div>
      </div>
    </div>
  </div>

  <div id="tab-preview" class="hidden">
    <div class="card">
      <div class="section-row">
        <div>
          <div style="font-size:14px;font-weight:700">출력 미리보기</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">발주 데이터를 정리한 출력용 목록입니다.</div>
        </div>
      </div>
      <div id="previewArea"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "recipe_cost_utf8_v1";
const ORDER_KEY = "recipe_cost_order_v1";
const LEGACY_RECIPE_KEY = "rcd6";
const LEGACY_ORDER_KEY = "order_data";

let state = {
  products: [],
  prices: {},
  selectedProducts: [],
  resultOptions: {},
  orderPresets: {},
  orderInputs: {}
};

let editingProductId = null;

function uid() {
  return Math.random().toString(36).slice(2, 9);
}

function esc(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function priceKey(name) {
  return String(name || "").trim();
}

function fmt(num) {
  const value = Math.round((Number(num) || 0) * 100) / 100;
  return value % 1 === 0
    ? value.toLocaleString()
    : value.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function normalizeRow(row, kind) {
  return {
    id: String(row?.id || uid()),
    name: String(row?.name || "").trim(),
    alias: kind === "sup" ? String(row?.alias || "") : "",
    weight: Number(row?.weight) || 0,
    unit: row?.unit === "kg" ? "kg" : "g",
    isUnit: kind === "ing" ? Boolean(row?.isUnit) : false,
    unitName: kind === "ing" ? String(row?.unitName || "") : ""
  };
}

function normalizeProduct(product) {
  return {
    id: String(product?.id || uid()),
    name: String(product?.name || "").trim(),
    ingredients: Array.isArray(product?.ingredients) ? product.ingredients.map(row => normalizeRow(row, "ing")) : [],
    supplements: Array.isArray(product?.supplements) ? product.supplements.map(row => normalizeRow(row, "sup")) : []
  };
}

function migrateLegacyPresets(legacyPresets) {
  const next = {};
  Object.entries(legacyPresets || {}).forEach(([productName, list]) => {
    const normalized = (Array.isArray(list) ? list : [])
      .map((item, index) => {
        if (typeof item === "number" || typeof item === "string") {
          const weight = Number(item);
          if (!weight) return null;
          return { code: "", weight, label: "", unitId: "" };
        }
        if (item && typeof item === "object") {
          const weight = Number(item.weight ?? item.value ?? item.grams ?? item.g);
          if (!weight) return null;
          return {
            code: String(item.code || ""),
            weight,
            label: String(item.label || item.name || ""),
            unitId: String(item.unitId || "")
          };
        }
        return null;
      })
      .filter(Boolean);
    if (normalized.length) next[productName] = normalized;
  });
  return next;
}

function migrateLegacyOrderInputs(legacyOrderData, presetMap) {
  const next = {};
  Object.entries(legacyOrderData || {}).forEach(([productName, weightMap]) => {
    const presets = Array.isArray(presetMap?.[productName]) ? presetMap[productName] : [];
    Object.entries(weightMap || {}).forEach(([weightKey, supMap]) => {
      const weight = Number(weightKey);
      const preset = presets.find(item => Number(item.weight) === weight);
      const presetCode = preset?.code || "";
      if (!presetCode) return;
      Object.entries(supMap || {}).forEach(([supplementName, qty]) => {
        const amount = parseInt(qty, 10) || 0;
        if (amount <= 0) return;
        next[`${productName}__${presetCode}__${supplementName}`] = amount;
      });
    });
  });
  return next;
}

function showToast(message) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

function saveRecipeData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    products: state.products,
    prices: state.prices,
    selectedProducts: state.selectedProducts,
    resultOptions: state.resultOptions
  }));
}

function saveOrderData() {
  localStorage.setItem(ORDER_KEY, JSON.stringify({
    orderPresets: state.orderPresets,
    orderInputs: state.orderInputs
  }));
}

function saveData() {
  collectAllInputs();
  saveRecipeData();
  saveOrderData();
  showToast("저장 완료");
}

function downloadData() {
  collectAllInputs();
  const today = new Date().toISOString().slice(0, 10);
  const payload = JSON.stringify(state, null, 2);
  const blob = new Blob([payload], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `recipe-cost-${today}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast("다운로드 완료");
}

function loadData() {
  let loadedRecipe = false;
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (Array.isArray(saved.products) && saved.products.length) {
      state.products = saved.products.map(normalizeProduct);
      state.prices = saved.prices || {};
      state.selectedProducts = saved.selectedProducts || [];
      state.resultOptions = saved.resultOptions || {};
      loadedRecipe = true;
    }
  } catch (e) {}

  if (!loadedRecipe) {
    try {
      const legacy = JSON.parse(localStorage.getItem(LEGACY_RECIPE_KEY) || "{}");
      state.products = Array.isArray(legacy.products) ? legacy.products.map(normalizeProduct) : [];
      state.prices = legacy.prices || {};
      state.selectedProducts = legacy.selectedProducts || [];
      state.resultOptions = legacy.resultOptions || {};
      if (state.products.length) saveRecipeData();
    } catch (e) {}
  }

  let loadedOrder = false;
  try {
    const savedOrder = JSON.parse(localStorage.getItem(ORDER_KEY) || "{}");
    if ((savedOrder.orderPresets && Object.keys(savedOrder.orderPresets).length) || (savedOrder.orderInputs && Object.keys(savedOrder.orderInputs).length)) {
      state.orderPresets = savedOrder.orderPresets || {};
      state.orderInputs = savedOrder.orderInputs || {};
      loadedOrder = true;
    }
  } catch (e) {}

  if (!loadedOrder) {
    try {
      const legacyOrder = JSON.parse(localStorage.getItem(LEGACY_ORDER_KEY) || "{}");
      state.orderPresets = migrateLegacyPresets(legacyOrder.presets || {});
      Object.keys(state.orderPresets).forEach(productName => normalizePresets(productName));
      state.orderInputs = migrateLegacyOrderInputs(legacyOrder.orderData || {}, state.orderPresets);
      if (Object.keys(state.orderPresets).length || Object.keys(state.orderInputs).length) saveOrderData();
    } catch (e) {}
  }
}

function getResultOption(pid) {
  if (!state.resultOptions[pid]) {
    state.resultOptions[pid] = {
      unitId: "",
      weight: "",
      supplementOnly: false,
      presetLabel: ""
    };
  }
  return state.resultOptions[pid];
}

function getPresetCode(productName, index) {
  const productIndex = state.products.findIndex(p => p.name.trim() === productName);
  const prefix = productIndex >= 0 && productIndex < 26 ? String.fromCharCode(65 + productIndex) : "P";
  return `${prefix}${index}`;
}

function buildPresetName(productName, weight, label) {
  const weightName = weight >= 1000
    ? `${String(Math.round(weight / 1000)).padStart(2, "0")}KG`
    : `${String(Math.round(weight)).padStart(2, "0")}G`;
  return `${productName} ${weightName}${label ? " " + label : ""}`.trim();
}

function normalizePresets(productName) {
  const list = Array.isArray(state.orderPresets[productName]) ? state.orderPresets[productName] : [];
  state.orderPresets[productName] = list
    .filter(item => item && Number(item.weight) > 0)
    .sort((a, b) => Number(a.weight) - Number(b.weight))
    .map((item, index) => ({
      code: item.code || getPresetCode(productName, index),
      weight: Number(item.weight),
      label: String(item.label || ""),
      unitId: String(item.unitId || ""),
      displayName: buildPresetName(productName, Number(item.weight), String(item.label || ""))
    }));
  return state.orderPresets[productName];
}

function collectAllInputs() {
  state.products.forEach(product => {
    const nameEl = document.getElementById(`pname-${product.id}`);
    if (nameEl) product.name = nameEl.value.trim();

    product.ingredients.forEach(row => {
      const nameEl2 = document.getElementById(`ing-name-${row.id}`);
      const weightEl = document.getElementById(`ing-wt-${row.id}`);
      const unitEl = document.getElementById(`ing-un-${row.id}`);
      const checkEl = document.getElementById(`ing-ck-${row.id}`);
      const unitNameEl = document.getElementById(`ing-uname-${row.id}`);
      if (nameEl2) row.name = nameEl2.value.trim();
      if (unitEl) row.unit = unitEl.value;
      if (weightEl) {
        const raw = parseFloat(weightEl.value) || 0;
        row.weight = row.unit === "kg" ? raw * 1000 : raw;
      }
      if (checkEl) row.isUnit = checkEl.checked;
      if (unitNameEl) row.unitName = unitNameEl.value.trim();
      if (!row.isUnit) row.unitName = "";
    });

    product.supplements.forEach(row => {
      const nameEl2 = document.getElementById(`sup-name-${row.id}`);
      const aliasEl = document.getElementById(`sup-alias-${row.id}`);
      const weightEl = document.getElementById(`sup-wt-${row.id}`);
      const unitEl = document.getElementById(`sup-un-${row.id}`);
      if (nameEl2) row.name = nameEl2.value.trim();
      if (aliasEl) row.alias = aliasEl.value.trim();
      if (unitEl) row.unit = unitEl.value;
      if (weightEl) {
        const raw = parseFloat(weightEl.value) || 0;
        row.weight = row.unit === "kg" ? raw * 1000 : raw;
      }
    });
  });

  collectResultInputs();
  collectPrices();
}

function collectResultInputs() {
  state.selectedProducts.forEach(pid => {
    const opt = getResultOption(pid);
    const unitEl = document.getElementById(`usel-${pid}`);
    const weightEl = document.getElementById(`uwt-${pid}`);
    const supOnlyEl = document.getElementById(`suponly-${pid}`);
    const presetEl = document.getElementById(`preset-name-${pid}`);
    if (unitEl) opt.unitId = unitEl.value;
    if (weightEl) opt.weight = weightEl.value;
    if (supOnlyEl) opt.supplementOnly = supOnlyEl.checked;
    if (presetEl) opt.presetLabel = presetEl.value.trim();
  });
}

function collectPrices() {
  document.querySelectorAll("#ingredientPriceTable tr[data-name], #supplementPriceTable tr[data-name]").forEach(tr => {
    const key = priceKey(tr.dataset.name);
    const unitInput = tr.querySelector(".unit-inp");
    const priceInput = tr.querySelector(".price-inp");
    if (!key) return;
    state.prices[key] = {
      unit: parseFloat(unitInput?.value || "") || 0,
      price: parseFloat(priceInput?.value || "") || 0
    };
  });
}

function addProduct() {
  collectAllInputs();
  const product = { id: uid(), name: "", ingredients: [], supplements: [] };
  state.products.push(product);
  editingProductId = product.id;
  renderProducts();
  syncPriceTab();
}

function editProduct(id) {
  collectAllInputs();
  editingProductId = editingProductId === id ? null : id;
  renderProducts();
}

function removeProduct(id) {
  collectAllInputs();
  state.products = state.products.filter(p => p.id !== id);
  state.selectedProducts = state.selectedProducts.filter(pid => pid !== id);
  delete state.resultOptions[id];
  if (editingProductId === id) editingProductId = null;
  renderProducts();
  syncPriceTab();
}

function addIngredient(pid, type) {
  collectAllInputs();
  const product = state.products.find(p => p.id === pid);
  if (!product) return;
  const row = { id: uid(), name: "", alias: "", weight: 0, unit: "g", isUnit: false, unitName: "" };
  (type === "ing" ? product.ingredients : product.supplements).push(row);
  renderProducts();
  syncPriceTab();
}

function removeRow(pid, type, rid) {
  collectAllInputs();
  const product = state.products.find(p => p.id === pid);
  if (!product) return;
  const list = type === "ing" ? product.ingredients : product.supplements;
  const idx = list.findIndex(row => row.id === rid);
  if (idx > -1) list.splice(idx, 1);
  renderProducts();
  syncPriceTab();
}

                  <option value="g" ${row.unit !== "kg" ? "selected" : ""}>g</option>

document.getElementById("addProductBtn").addEventListener("click", addProduct);

document.getElementById("productList").addEventListener("click", e => {
  const editBtn = e.target.closest("[data-edit]");
  if (editBtn) { editProduct(editBtn.dataset.edit); return; }
  const removeBtn = e.target.closest("[data-remove]");
  if (removeBtn) { removeProduct(removeBtn.dataset.remove); return; }
  const delRow = e.target.closest(".del-row");
  if (delRow) { removeRow(delRow.dataset.pid, delRow.dataset.type, delRow.dataset.rid); return; }
  const addRow = e.target.closest("[data-addrow]");
  if (addRow) { addIngredient(addRow.dataset.addrow, addRow.dataset.rtype); return; }
  const collapsed = e.target.closest(".card.collapsed[data-card]");
  if (collapsed) editProduct(collapsed.dataset.card);
});

function syncPriceTab() {
  const ing = new Set();
  const sup = new Set();
  state.products.forEach(product => {
    product.ingredients.forEach(row => { if (priceKey(row.name)) ing.add(priceKey(row.name)); });
    product.supplements.forEach(row => { if (priceKey(row.name)) sup.add(priceKey(row.name)); });
  });

  renderPriceRows(ing, "ingredientPriceTable", "ingredientPriceEmpty");
  renderPriceRows(sup, "supplementPriceTable", "supplementPriceEmpty");
}

function renderPriceRows(names, tbodyId, emptyId) {
  const tbody = document.getElementById(tbodyId);
  const empty = document.getElementById(emptyId);
  if (!names.size) {
    tbody.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");
  tbody.innerHTML = [...names].map(name => {
    const row = state.prices[name] || {};
    return `<tr data-name="${esc(name)}">
      <td style="font-weight:500">${esc(name)}</td>
      <td><input class="unit-inp" type="number" value="${row.unit || ""}" placeholder="1000" min="0" style="text-align:right"></td>
      <td><input class="price-inp" type="number" value="${row.price || ""}" placeholder="0" min="0" style="text-align:right"></td>
    </tr>`;
  }).join("");
}

function switchTab(tab) {
  collectAllInputs();
  ["recipe", "price", "result", "order", "preview"].forEach(name => {
    document.getElementById(`tab-${name}`).classList.toggle("hidden", name !== tab);
  });
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.dataset.tab === tab));
  if (tab === "price") syncPriceTab();
  if (tab === "result") renderResultTab();
  if (tab === "order") renderOrderTab();
  if (tab === "preview") renderPreviewTab();
}

document.getElementById("tabBar").addEventListener("click", e => {
  const tab = e.target.dataset.tab;
  if (tab) switchTab(tab);
});

function renderResultTab() {
  const named = state.products.filter(product => product.name.trim());
  document.getElementById("productChips").innerHTML = named.length
    ? named.map(product => `<button class="chip ${state.selectedProducts.includes(product.id) ? "selected" : ""}" data-pid="${product.id}">${esc(product.name)}</button>`).join("")
    : '<span class="empty" style="display:block;width:100%">등록된 제품이 없습니다.</span>';
  buildResultCards();
}

document.addEventListener("click", e => {
  const chip = e.target.closest("#productChips .chip");
  if (chip) toggleProduct(chip.dataset.pid);
});

function toggleProduct(pid) {
  collectResultInputs();
  const idx = state.selectedProducts.indexOf(pid);
  if (idx > -1) state.selectedProducts.splice(idx, 1);
  else state.selectedProducts.push(pid);
  renderResultTab();
}

function getRatioInfo(product, opt) {
  const unitRows = product.ingredients.filter(row => row.isUnit && row.name.trim() && row.weight > 0);
  if (!unitRows.length) {
    return { ratio: 1, targetWeight: 0, selectedUnit: null, hasInput: false };
  }
  const selected = unitRows.find(row => row.id === opt.unitId) || unitRows[0];
  const raw = parseFloat(opt.weight || "") || 0;
  if (raw <= 0) {
    return { ratio: 1, targetWeight: 0, selectedUnit: selected, hasInput: false };
  }
  const targetWeight = selected.unit === "kg" ? raw * 1000 : raw;
  const ratio = targetWeight / selected.weight;
  return { ratio, targetWeight, selectedUnit: selected, hasInput: true };
}

function buildResultCards() {
  const area = document.getElementById("resultArea");
  if (!state.selectedProducts.length) {
    area.innerHTML = "";
    return;
  }

  const cards = state.selectedProducts.map(pid => {
    const product = state.products.find(p => p.id === pid);
    if (!product) return "";
    const opt = getResultOption(pid);
    const unitRows = product.ingredients.filter(row => row.isUnit && row.name.trim() && row.weight > 0);
    if (unitRows.length && !unitRows.some(row => row.id === opt.unitId)) opt.unitId = unitRows[0].id;
    const info = getRatioInfo(product, opt);

    const rows = [
      ...(opt.supplementOnly ? [] : product.ingredients.map(row => ({ ...row, kind: "원료" }))),
      ...product.supplements.map(row => ({ ...row, kind: "영양제" }))
    ].filter(row => row.name.trim() && row.weight > 0);

    let totalWeight = 0;
    let totalCost = 0;
    const bodyRows = rows.map(row => {
      const scaled = row.weight * info.ratio;
      totalWeight += scaled;
      const price = state.prices[priceKey(row.name)] || {};
      const cost = price.unit > 0 ? (scaled / price.unit) * (price.price || 0) : 0;
      totalCost += cost;
      return `<tr>
        <td>${esc(row.kind === "영양제" ? (row.alias || row.name) : row.name)} <span style="font-size:10px;color:var(--text3)">(${esc(row.name)})</span></td>
        <td style="text-align:right">${fmt(scaled)}g</td>
        <td style="text-align:right">${Math.round(cost).toLocaleString()}원</td>
      </tr>`;
    }).join("");

    return `<div class="rcard">
      <div class="rcard-head">
        <div class="rcard-name">${esc(product.name)}</div>
        ${unitRows.length ? `
        <div class="unit-ctrl">
          <select class="unit-select" id="usel-${pid}" onchange="onResultUnitChange('${pid}')">
            ${unitRows.map(row => `<option value="${row.id}" ${row.id === opt.unitId ? "selected" : ""}>${esc(row.name)} 기준 ${fmt(row.weight)}g</option>`).join("")}
          </select>
          <div class="unit-input-wrap">
            <input class="unit-weight-input" type="number" id="uwt-${pid}" value="${esc(opt.weight || "")}" placeholder="0" min="0" step="0.1" oninput="updateResultCard('${pid}')">
            <span>${esc(info.selectedUnit?.unit || "g")}</span>
          </div>
          <span class="ratio-badge">${info.hasInput ? `x ${fmt(info.ratio)}` : "x -"}</span>
        </div>` : `<div style="font-size:12px;color:var(--text3)">생산단위 원료를 먼저 체크해 주세요.</div>`}
      </div>
      <div class="result-actions">
        <input type="text" id="preset-name-${pid}" value="${esc(opt.presetLabel || "")}" placeholder="프리셋명" style="max-width:180px;border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg2);color:var(--text)">
        <button class="btn btn-primary" onclick="savePresetFromResult('${pid}')">프리셋 저장</button>
      </div>
      <div style="padding:0 18px 10px;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="suponly-${pid}" ${opt.supplementOnly ? "checked" : ""} onchange="updateResultCard('${pid}')">
        <label for="suponly-${pid}" style="font-size:12px;color:var(--text2)">영양제만 보기</label>
      </div>
      <div class="rcard-body">
        <table>
          <thead><tr><th>항목</th><th style="text-align:right">중량</th><th style="text-align:right">원가</th></tr></thead>
          <tbody>
            ${bodyRows || '<tr><td colspan="3" class="empty">표시할 항목이 없습니다.</td></tr>'}
          </tbody>
        </table>
      </div>
      <div class="rcard-foot">
        <div style="font-size:12px;color:var(--text2)">기준 중량에 맞춰 자동 계산됩니다.</div>
        <div class="foot-item"><div class="foot-label">총 중량</div><div class="foot-val">${fmt(totalWeight)}g</div></div>
        <div class="foot-item"><div class="foot-label">총 원가</div><div class="foot-val">${Math.round(totalCost).toLocaleString()}원</div></div>
      </div>
    </div>`;
  }).join("");

  area.innerHTML = `<div class="result-grid">${cards}</div>`;
}

function onResultUnitChange(pid) {
  collectResultInputs();
  buildResultCards();
}

function updateResultCard(pid) {
  collectResultInputs();
  buildResultCards();
}

function savePresetFromResult(pid) {
  collectAllInputs();
  const product = state.products.find(p => p.id === pid);
  if (!product || !product.name.trim()) {
    showToast("제품명을 먼저 입력해 주세요.");
    return;
  }
  const opt = getResultOption(pid);
  const info = getRatioInfo(product, opt);
  if (!info.hasInput || !info.targetWeight) {
    showToast("결과 탭에서 중량을 먼저 입력해 주세요.");
    return;
  }
  const list = normalizePresets(product.name.trim()).slice();
  list.push({
    weight: info.targetWeight,
    label: opt.presetLabel || "",
    unitId: opt.unitId || ""
  });
  state.orderPresets[product.name.trim()] = list;
  normalizePresets(product.name.trim());
  saveOrderData();
  renderOrderTab();
  showToast("발주 프리셋 저장 완료");
}

function clearAllPresets() {
  state.orderPresets = {};
  state.orderInputs = {};
  saveOrderData();
  renderOrderTab();
}

function getSupplementAlias(row) {
  return String(row.alias || row.name || "").trim();
}

function getPresetRatio(product, preset) {
  const unitRows = product.ingredients.filter(row => row.isUnit && row.name.trim() && row.weight > 0);
  const selected = unitRows.find(row => row.id === preset.unitId) || unitRows[0];
  if (!selected || !selected.weight) return 1;
  return Number(preset.weight) / selected.weight;
}

function renderOrderTab() {
  const presetGrid = document.getElementById("presetGrid");
  const supMapTable = document.getElementById("supMapTable");
  const orderArea = document.getElementById("orderArea");

  const presetProducts = Object.keys(state.orderPresets).filter(name => normalizePresets(name).length);

  presetGrid.innerHTML = presetProducts.length
    ? presetProducts.map(name => {
      const list = normalizePresets(name);
      return `<div class="preset-card">
        <div class="preset-card-name"><span>${esc(name)}</span></div>
        <div class="preset-lines">
          ${list.map(item => `<div class="preset-line"><span class="badge">${esc(item.code)}</span><span>${esc(item.displayName)}</span></div>`).join("")}
        </div>
      </div>`;
    }).join("")
    : '<div class="empty">저장된 프리셋이 없습니다.</div>';

  const aliasRows = [];
  state.products.forEach(product => {
    product.supplements.forEach(row => {
      if (!row.name.trim()) return;
      aliasRows.push(`<tr><td>${esc(row.name)}</td><td>${esc(getSupplementAlias(row))}</td></tr>`);
    });
  });
  supMapTable.innerHTML = aliasRows.join("") || '<tr><td colspan="2" class="empty">영양제 치환명이 없습니다.</td></tr>';

  if (!presetProducts.length) {
    orderArea.innerHTML = '<div class="empty">결과 탭에서 프리셋을 저장해 주세요.</div>';
    return;
  }

  orderArea.innerHTML = presetProducts.map(productName => {
    const product = state.products.find(p => p.name.trim() === productName);
    const presets = normalizePresets(productName);
    if (!product) return "";
    const supplements = product.supplements.filter(row => row.name.trim());
    return `<div class="order-product-row">
      <div class="order-product-header">
        <span class="order-product-name">${esc(productName)}</span>
        <span class="badge">${presets.length}개 프리셋</span>
      </div>
      <div class="order-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:180px">영양제</th>
              ${presets.map(preset => `<th style="text-align:center">${esc(preset.code)}<br><span style="font-size:10px;font-weight:400">${esc(preset.displayName)}</span></th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${supplements.map(row => `<tr>
              <td style="font-weight:600">${esc(getSupplementAlias(row))} <span style="font-size:10px;color:var(--text3)">(${esc(row.name)})</span></td>
              ${presets.map(preset => {
                const grams = row.weight * getPresetRatio(product, preset);
                const key = `${productName}__${preset.code}__${row.name}`;
                const inputValue = state.orderInputs[key] || "";
                return `<td><div class="order-cell"><div class="order-cell-grams">${fmt(grams)}g</div><div class="order-cell-sub">부족 수량</div><input class="order-cell-input" type="number" min="0" step="1" value="${esc(inputValue)}" onchange="setOrderInput('${esc(productName)}','${esc(preset.code)}','${esc(row.name)}', this.value)"></div></td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join("");
}

function setOrderInput(productName, presetCode, supplementName, value) {
  const key = `${productName}__${presetCode}__${supplementName}`;
  const amount = parseInt(value, 10) || 0;
  if (amount > 0) state.orderInputs[key] = amount;
  else delete state.orderInputs[key];
  saveOrderData();
}

function generatePreview() {
  collectAllInputs();
  renderPreviewTab();
  switchTab("preview");
}

function renderPreviewTab() {
  const area = document.getElementById("previewArea");
  const rows = Object.keys(state.orderInputs).map(key => {
    const [productName, presetCode, supplementName] = key.split("__");
    const qty = state.orderInputs[key];
    const product = state.products.find(p => p.name.trim() === productName);
    const preset = normalizePresets(productName).find(item => item.code === presetCode);
    const supplement = product?.supplements?.find(row => row.name === supplementName);
    return {
      productName,
      presetCode,
      presetName: preset?.displayName || presetCode,
      supplementName: getSupplementAlias(supplement || { name: supplementName }),
      qty
    };
  }).filter(row => row.qty > 0);

  if (!rows.length) {
    area.innerHTML = '<div class="empty">입력된 부족 수량이 없습니다.</div>';
    return;
  }

  area.innerHTML = `
    <div class="preview-box">
      <div class="preview-title">영양제 발주 목록</div>
      <div class="preview-sub">${new Date().toLocaleDateString("ko-KR")}</div>
      <table class="pv-table">
        <thead><tr><th>코드</th><th class="left">제품/프리셋</th><th class="left">영양제</th><th>수량</th></tr></thead>
        <tbody>
          ${rows.map(row => `<tr><td>${esc(row.presetCode)}</td><td class="left">${esc(row.productName)} / ${esc(row.presetName)}</td><td class="left">${esc(row.supplementName)}</td><td>${row.qty}</td></tr>`).join("")}
        </tbody>
      </table>
    </div>`;
}

loadData();
renderProducts();
syncPriceTab();
renderOrderTab();

window.addEventListener("beforeunload", () => {
  collectAllInputs();
  saveRecipeData();
  saveOrderData();
});
</script>
</body>
</html>
